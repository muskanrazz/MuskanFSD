        p {
            display: block;

        p :hover{

     {

}
button{
    background-color: aquamarine;
}
button hover {
     background-color: bisque;
}
 p{
   display: none;
}
 .btn:hover + p{
    display: block;
} 
 p{
    display: none;
 } 

.btn-grad {
  background-image: linear-gradient(to right, #3CA55C 0%, #B5AC49 51%, #3CA55C 100%);
}

.btn-grad {
  margin: 10px;
  padding: 15px 45px;
  text-align: center;
  text-transform: uppercase;
  transition: 0.5s;
  background-size: 200% auto;
  color: white;
  box-shadow: 0 0 20px #eee;
  border-radius: 10px;
  display: block;
  outline: none;
  border: none;
}

.btn-grad:hover {
  background-position: right center;
  color: #fff;
  text-decoration: none;
}


</style>
</head>
