<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Story Scroller</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: white;
  padding: 20px;
}

/* Container */
.story-container {
  display: flex;
  overflow: auto;
  gap: 15px;
  padding: 10px;
}

/* Hide scrollbar (optional) */
.story-container::-webkit-scrollbar {
  display: none;
}

/* Each Story */
.story {
  text-align: center;
  min-width: 80px;
}

/* Profile Image */
.story img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg, red, orange, purple);
}

/* Username */
.story p {
  font-size: 12px;
  margin-top: 5px;
}
  </style>
</head>
<body>
